name: breez_food_driver
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  video_player: ^2.9.1
  lottie: ^3.1.2
  flutter_screenutil: ^5.9.3
  pin_code_fields: ^8.0.1
  geolocator: ^13.0.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  carousel_slider: ^5.0.0
  flutter_rating_bar: ^4.0.1
  share_plus: ^10.0.2
  flutter_slidable: ^3.1.1
  dotted_border: ^2.1.0
  google_maps_flutter: ^2.9.0
  flutter_easyloading: ^3.0.5
  image_picker: ^1.2.1
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  get_it: ^7.6.7
  dio: ^5.9.0
  easy_localization: ^3.0.7
  pretty_dio_logger: ^1.3.1

  retrofit: 4.1.0

  json_annotation: ^4.9.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.1
  url_launcher: ^6.2.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  iconsax: ^0.0.8
  file_picker: ^8.1.2
  location: ^8.0.1
  path_provider: ^2.1.5
  path: ^1.9.0
  flutter_local_notifications: ^19.5.0
  googleapis_auth: ^1.6.0
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  connectivity_plus: ^7.0.0
  pusher_channels_flutter: ^2.5.0
  audioplayers: ^6.0.0
  internet_connection_checker_plus: ^2.9.1+2

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9
  freezed: ^2.5.2
  freezed_annotation: ^2.4.4
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/logoBreezefood.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/characters/
    - assets/avatars/
    - assets/video/splachscreen.mp4
    - assets/translations/
    - assets/b_driver/onboarding.png
    - assets/b_driver/customer_map_point.png
    - assets/b_driver/driver_map_point.png
    - assets/b_driver/resturant_map_point.png
    - assets/sounds/
    - assets/sounds/offer_ringtone.mp3


  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/static/Inter_18pt-Bold.ttf
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo/static/Cairo-Bold.ttf
